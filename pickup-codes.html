<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>熊熊驿站</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding-bottom:80px}
.header{background:#fff;color:#5D4037;padding:12px 15px;text-align:center;position:relative;border-bottom:1px solid #FFE4E1}
.header h1{font-size:20px;font-weight:700}
.header-img{width:100%;max-height:100px;object-fit:contain;border-radius:12px;margin-bottom:4px}
.header-right{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:20px;cursor:pointer}
.header-right span{margin-left:8px}
.view-tabs{display:flex;padding:8px 15px 0}
.view-tab{flex:1;text-align:center;padding:8px;font-size:14px;color:#666;border-bottom:2px solid transparent;cursor:pointer}
.view-tab.active{color:#FF69B4;border-bottom-color:#FF69B4;font-weight:600}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #FFE4E1;z-index:10;padding-bottom:env(safe-area-inset-bottom)}
.bottom-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;font-size:11px;color:#666;background:none;border:none;cursor:pointer}
.bottom-btn .icon{font-size:22px;margin-bottom:2px}
.bottom-btn.primary{color:#FF69B4}
.search-bar{padding:8px 15px}
.search-bar input{width:100%;padding:10px 15px;border-radius:20px;border:1px solid #FFB6C1;font-size:15px;background:#fff}
.tabs{display:flex;padding:0 15px;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tab{padding:5px 10px;border-radius:20px;background:#fff;border:1px solid #FFB6C1;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.tab.active{background:#FF69B4;color:#fff;border-color:#FF69B4}
.courier-logo{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#fff;flex-shrink:0}
.card-list{padding:0 15px}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:10px;box-shadow:0 2px 8px rgba(255,182,193,.2);border:1px solid #FFE4E1}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-tag{padding:2px 8px;border-radius:4px;font-size:12px;color:#fff;display:flex;align-items:center;gap:4px}
.card-time{font-size:12px;color:#D7CCC8}
.card-code{font-size:28px;font-weight:bold;color:#D81B60;letter-spacing:2px;margin-bottom:5px;cursor:pointer}
.card-station{font-size:13px;color:#BC8F8F}
.card-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
.card-actions button{background:none;border:none;font-size:13px;color:#FF69B4;cursor:pointer}
.card-actions .delete{color:#FF6B6B}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:9999!important;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:25px;width:85%;max-width:350px;max-height:85vh;overflow-y:auto}
.modal h2{margin-bottom:15px;font-size:18px}
.modal label{font-size:14px;color:#666;margin-bottom:5px;display:block}
.modal input,.modal select,.modal textarea{width:100%;padding:10px;border:1px solid #FFB6C1;border-radius:12px;font-size:15px;margin-bottom:12px;font-family:inherit}
.modal-btns{display:flex;gap:10px;margin-top:5px}
.modal-btns button{flex:1;padding:12px;border-radius:12px;border:none;font-size:16px;cursor:pointer}
.btn-cancel{background:#f0f0f0;color:#333}
.btn-save{background:#FF69B4;color:#fff}
.btn-location{width:100%;padding:10px;border:1px dashed #FF69B4;border-radius:12px;font-size:14px;color:#FF69B4;background:#FFF0F5;cursor:pointer;margin-bottom:12px;text-align:center}
.empty{text-align:center;padding:60px 20px;color:#BC8F8F}
.empty-icon{font-size:48px;margin-bottom:10px}
.ocr-zone{margin:10px 15px;border:2px dashed #FFB6C1;border-radius:16px;padding:25px;text-align:center;background:#fff;cursor:pointer}
.ocr-zone:active{background:#FFF0F5}
.ocr-zone .icon{font-size:36px;margin-bottom:8px}
.ocr-zone .text{font-size:14px;color:#BC8F8F}
.ocr-zone input[type="file"]{display:none}
.ocr-loading{display:none;margin:10px 15px;background:#fff;border-radius:12px;padding:20px;text-align:center}
.ocr-loading.show{display:block}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid #FFE4E1;border-top-color:#FF69B4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-loading .status{margin-top:10px;font-size:14px;color:#666}
.ocr-result{display:none;margin:10px 15px;background:#fff;border-radius:12px;padding:15px;position:relative}
.ocr-result.show{display:block}
.ocr-result h3{font-size:15px;margin-bottom:10px;color:#333;padding-right:30px}
.ocr-close{position:absolute;top:12px;right:12px;width:28px;height:28px;background:#f0f0f0;border-radius:50%;text-align:center;line-height:28px;font-size:16px;color:#999;cursor:pointer}
.ocr-item{display:flex;align-items:center;justify-content:space-between;padding:10px;background:#FFF0F5;border-radius:8px;margin-bottom:8px}
.ocr-item .code{font-size:18px;font-weight:bold;color:#FF69B4}
.ocr-item .info{font-size:12px;color:#BC8F8F;margin-top:2px}
.ocr-item button{background:#FF69B4;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer}
#mapView{display:none}
#mapContainer{width:100%;height:calc(100vh - 170px);border-radius:12px;overflow:hidden;margin:10px 15px;position:relative;z-index:1}
.custom-marker{background:#FF69B4;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;border:2px solid #fff;box-shadow:0 2px 6px rgba(255,105,180,.4)}
.map-popup h4{margin:0 0 4px;font-size:14px}
.map-popup .popup-code{font-size:15px;font-weight:bold;color:#FF69B4;cursor:pointer}
.card.picked-up{opacity:.5;border-style:dashed}
.card.picked-up .card-code{text-decoration:line-through;color:#999}
.card.picked-up .card-station{color:#ccc}
.btn-pickup{background:#4CAF50!important;color:#fff!important;border-radius:6px!important;padding:4px 10px!important;font-size:12px!important}
.btn-pickup:active{background:#388E3C!important}
body.dark{background:#1a1a2e;color:#e0e0e0}
body.dark .header{background:#16213e;border-bottom-color:#333}
body.dark .header h1{color:#e0e0e0}
body.dark .view-tab{color:#999}
body.dark .view-tab.active{color:#FF69B4}
body.dark .bottom-bar{background:#16213e;border-top-color:#333}
body.dark .bottom-btn{color:#999}
body.dark .search-bar input{background:#1a1a2e;border-color:#333;color:#e0e0e0}
body.dark .tab{background:#1a1a2e;border-color:#333;color:#ccc}
body.dark .tab.active{background:#FF69B4;color:#fff}
body.dark .card{background:#16213e;border-color:#333;box-shadow:0 2px 8px rgba(0,0,0,.3)}
body.dark .card-code{color:#FF69B4}
body.dark .card-station{color:#888}
body.dark .card-time{color:#666}
body.dark .modal{background:#16213e}
body.dark .modal h2{color:#e0e0e0}
body.dark .modal label{color:#999}
body.dark .modal input,.body.dark .modal select,.body.dark .modal textarea{background:#1a1a2e;border-color:#333;color:#e0e0e0}
body.dark .ocr-zone{background:#16213e;border-color:#333}
body.dark .ocr-loading{background:#16213e}
body.dark .ocr-result{background:#16213e}
body.dark .ocr-item{background:#1a1a2e}
body.dark .ocr-item .info{color:#888}
body.dark .empty{color:#666}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.stat-card{background:#FFF0F5;border-radius:12px;padding:15px;text-align:center}
.stat-card .num{font-size:28px;font-weight:bold;color:#D81B60}
.stat-card .label{font-size:12px;color:#BC8F8F;margin-top:4px}
body.dark .stat-card{background:#1a1a2e}
body.dark .stat-card .num{color:#FF69B4}
body.dark .stat-card .label{color:#888}
.btn-cleanup{width:100%;padding:10px;border:1px solid #FF6B6B;border-radius:12px;font-size:14px;color:#FF6B6B;background:#fff;cursor:pointer;margin-top:10px}
body.dark .btn-cleanup{background:#16213e}
.btn-cleanup:active{background:#FFF0F0}
</style>
</head>
<body>
<div class="header">
  <img class="header-img" src="header.png" alt="熊熊驿站" onerror="this.style.display='none'">
  <h1>🐻 熊熊驿站 🐼</h1>
  <div class="header-right"><span onclick="toggleDarkMode()" id="darkBtn">🌙</span><span onclick="openStats()">📊</span><span onclick="toggleLocation()">📍</span><span onclick="openSettings()">⚙️</span></div>
</div>
<div class="view-tabs">
  <div class="view-tab active" onclick="switchView('list')">📦 熊熊快递单</div>
  <div class="view-tab" onclick="switchView('map')">🗺️ 熊熊地图</div>
</div>
<div id="listView">
  <div class="ocr-zone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" capture="environment">
    <div class="icon">📸</div>
    <div class="text">点击上传截图自动识别取件码<br>或长按粘贴截图<br><span style="font-size:12px;color:#FF69B4;margin-top:4px;display:block">📱 添加到桌面后建议用下方「粘贴识别」</span></div>
  </div>
  <div class="ocr-loading" id="ocrLoading"><div class="spinner"></div><div class="status" id="ocrStatus">加载中...</div></div>
  <div class="ocr-result" id="ocrResult"><div class="ocr-close" onclick="closeOcrResult()">✕</div><h3>🔍 识别到以下取件码：</h3><div id="ocrItems"></div></div>
  <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 搜索取件码或驿站..." oninput="renderCards()"></div>
  <div class="tabs" id="courierTabs"></div>
  <div class="card-list" id="cardList"></div>
</div>
<div id="mapView"><div id="mapContainer"></div></div>
<div class="bottom-bar">
  <button class="bottom-btn" onclick="document.getElementById('fileInput').click()"><span class="icon">📸</span>截图识别</button>
  <button class="bottom-btn primary" onclick="openPasteModal()"><span class="icon">📋</span>粘贴识别</button>
  <button class="bottom-btn" onclick="openModal()"><span class="icon">＋</span>手动添加</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">添加取件码</h2>
    <label>取件码</label><input type="text" id="inputCode" placeholder="例如：B7-1-4667">
    <label>快递公司</label>
    <select id="inputCourier"><option value="">请选择</option><option>极兔</option><option>圆通</option><option>中通</option><option>韵达</option><option>申通</option><option>顺丰</option><option>京东</option><option>邮政EMS</option><option>菜鸟</option><option>德邦</option><option>其他</option></select>
    <label>驿站/代收点</label><input type="text" id="inputStation" placeholder="例如：财经学院1栋旁快递服务中心">
    <div class="btn-location" onclick="pickLocation()">📍 手动设置位置（可选）</div>
    <div id="locationInfo" style="font-size:12px;color:#BC8F8F;margin-top:-8px;margin-bottom:12px;"></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveItem()">保存</button></div>
  </div>
</div>

<div class="modal-overlay" id="pasteModal">
  <div class="modal">
    <h2>📋 粘贴快递信息</h2>
    <div style="font-size:12px;color:#BC8F8F;margin-bottom:8px">粘贴短信或订单文字，自动识别取件码和驿站</div>
    <textarea id="pasteInput" rows="4" placeholder="取件码 B7-1-4667&#10;驿加易代收点 | 9园区桂轩后面快递服务中心"></textarea>
    <div id="pastePreview"></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closePasteModal()">取消</button><button class="btn-save" onclick="parsePasteText()">识别</button></div>
  </div>
</div>

<div class="modal-overlay" id="locationModal">
  <div class="modal" style="padding:0;overflow:hidden">
    <div style="padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee"><span style="font-size:16px;font-weight:600">点击地图设置位置</span><span style="color:#FF69B4;cursor:pointer" onclick="closeLocationModal()">完成</span></div>
    <div id="pickMap" style="width:100%;height:300px"></div>
  </div>
</div>

<div class="modal-overlay" id="presetPickModal">
  <div class="modal" style="padding:0;overflow:hidden">
    <div style="padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee"><span style="font-size:16px;font-weight:600">📍 点击地图选取坐标</span><span style="color:#FF69B4;cursor:pointer" onclick="closePresetPickModal()">完成</span></div>
    <div id="presetPickMap" style="width:100%;height:300px"></div>
    <div style="padding:10px;text-align:center;font-size:13px;color:#666" id="presetPickInfo">点击地图选点，坐标会显示在这里</div>
  </div>
</div>

<div class="modal-overlay" id="statsModal">
  <div class="modal">
    <h2>📊 快递统计</h2>
    <div id="statsContent"></div>
    <button class="btn-cleanup" onclick="cleanupPickedUp()">🗑️ 清理已取快递</button>
    <div class="modal-btns" style="margin-top:12px"><button class="btn-cancel" onclick="closeStats()">关闭</button></div>
  </div>
</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ 设置</h2>
    <label>高德地图 API Key</label>
    <input type="text" id="inputApiKey" placeholder="高德地图 Web 服务 Key">
    <div style="font-size:12px;color:#BC8F8F;margin-top:-8px;margin-bottom:12px">免费申请：<a href="https://lbs.amap.com/" target="_blank" style="color:#FF69B4">lbs.amap.com</a></div>
    <label>常用驿站</label>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="pickPresetLocation()" style="flex:1;padding:8px;border:1px dashed #FF69B4;border-radius:8px;font-size:13px;color:#FF69B4;background:#FFF0F5;cursor:pointer">📍 在地图上选取坐标</button>
    </div>
    <textarea id="inputStations" rows="8" style="width:100%;padding:8px;border:1px solid #FFB6C1;border-radius:8px;font-size:11px;font-family:monospace;resize:vertical" placeholder="关键词=驿站名|地址|纬度,经度&#10;北门,美食广场=北门美食广场|地址|29.46,106.52"></textarea>
    <div style="font-size:11px;color:#BC8F8F;margin-top:-8px;margin-bottom:12px">格式：关键词=驿站名|地址|纬度,经度</div>
    <button onclick="openBackup()" style="width:100%;padding:10px;border:1px dashed #FF69B4;border-radius:12px;font-size:14px;color:#FF69B4;background:#FFF0F5;cursor:pointer;margin-bottom:12px">📦 数据备份/恢复</button>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeSettings()">取消</button><button class="btn-save" onclick="saveSettings()">保存</button></div>
  </div>
</div>

<div class="modal-overlay" id="backupModal">
  <div class="modal">
    <h2>📦 数据备份</h2>
    <div style="margin-bottom:15px">
      <button onclick="exportData()" style="width:100%;padding:12px;border:1px solid #FF69B4;border-radius:12px;font-size:14px;color:#FF69B4;background:#FFF0F5;cursor:pointer;margin-bottom:10px">📤 导出数据（复制到剪贴板）</button>
      <div style="font-size:12px;color:#BC8F8F;margin-bottom:15px">复制后发给自己，换设备时粘贴导入</div>
      <label>📥 导入数据</label>
      <textarea id="importData" rows="4" style="width:100%;padding:8px;border:1px solid #FFB6C1;border-radius:8px;font-size:12px;font-family:monospace;resize:vertical" placeholder="粘贴之前导出的数据..."></textarea>
      <button onclick="importData()" style="width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;color:#fff;background:#FF69B4;cursor:pointer;margin-top:8px">📥 导入</button>
    </div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeBackup()">关闭</button></div>
  </div>
</div>

<script>
const COLORS={极兔:'#FF8C00',圆通:'#4169E1',中通:'#DC143C',韵达:'#8B4513',申通:'#DAA520',顺丰:'#2F4F4F',京东:'#DC143C',邮政EMS:'#228B22',菜鸟:'#FF8C00',德邦:'#4169E1',其他:'#BC8F8F'};
const COURIERS=['全部','极兔','圆通','中通','韵达','申通','顺丰','京东','邮政EMS','菜鸟','德邦','其他'];

let items=JSON.parse(localStorage.getItem('pickupItems')||'[]');
let currentTab='全部',editId=null,worker=null,currentView='list',map=null,pickMap=null,pendingLocation=null;
let amapKey=localStorage.getItem('amapKey')||'';

function getLogo(c){return `<span class="courier-logo" style="background:${COLORS[c]||'#BC8F8F'}">${(c||'快')[0]}</span>`}

function renderTabs(){
  const used=new Set(items.map(i=>i.courier).filter(Boolean));
  const tabs=COURIERS.filter(c=>c==='全部'||used.has(c));
  document.getElementById('courierTabs').innerHTML=tabs.map(c=>`<div class="tab${currentTab===c?' active':''}" onclick="setTab('${c}',this)">${c==='全部'?'全部':getLogo(c)+c}</div>`).join('');
}

async function geocode(addr){
  if(!amapKey||!addr)return null;
  let a=addr.replace(/拨打电话|联系电话|投诉电[\u4e00-\u9fff]*|展开|复制|物流电话|联系驿站|取件|已签收/g,'').replace(/[|｜].*$/g,'').replace(/\d{7,}/g,'').trim();
  if(a.length<3)return null;
  const tryList=[];
  if(a.includes('重庆')||a.includes('涪陵')||a.includes('巴南'))tryList.push(a);
  else{tryList.push('重庆市'+a);tryList.push(a);}
  for(const t of tryList){
    try{const r=await fetch(`https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(t)}&key=${amapKey}&city=重庆`);const d=await r.json();if(d.status==='1'&&d.geocodes&&d.geocodes.length>0){const[lng,lat]=d.geocodes[0].location.split(',').map(Number);return{lat,lng};}}catch(e){}
  }
  return null;
}

const PRESET_STATIONS = [
  { keywords: ['北门', '美食广场', '美食'], name: '北门美食广场', address: '重庆市巴南区红光大道69号重庆财经学院北门', lat: 29.4613, lng: 106.5234 },
  { keywords: ['1栋', '一栋', '1号楼'], name: '1栋快递服务中心', address: '重庆市巴南区红光大道69号重庆财经学院宿舍1栋', lat: 29.4600, lng: 106.5220 },
  { keywords: ['食堂'], name: '食堂快递点', address: '重庆市巴南区红光大道69号重庆财经学院食堂', lat: 29.4608, lng: 106.5228 },
  { keywords: ['桂轩', '9园区', '9园'], name: '桂轩快递站', address: '重庆理工大学花溪校区桂轩快递站', lat: 29.4770, lng: 106.5370 },
  { keywords: ['鸿欣', '滨江国际南门'], name: '滨江国际南门鸿欣超市', address: '重庆市涪陵区滨江国际花园南门鸿欣超市', lat: 29.7180, lng: 107.3940 },
  { keywords: ['2栋', '二栋', '2号楼'], name: '2栋快递服务中心', address: '重庆市巴南区红光大道69号重庆财经学院宿舍2栋', lat: 29.4595, lng: 106.5215 },
  { keywords: ['3栋', '三栋', '3号楼'], name: '3栋快递服务中心', address: '重庆市巴南区红光大道69号重庆财经学院宿舍3栋', lat: 29.4590, lng: 106.5210 },
  { keywords: ['东门'], name: '东门快递点', address: '重庆市巴南区红光大道69号重庆财经学院东门', lat: 29.4605, lng: 106.5250 },
  { keywords: ['西门'], name: '西门快递点', address: '重庆市巴南区红光大道69号重庆财经学院西门', lat: 29.4605, lng: 106.5200 },
  { keywords: ['南门'], name: '南门快递点', address: '重庆市巴南区红光大道69号重庆财经学院南门', lat: 29.4585, lng: 106.5225 },

}

function cleanCJK(s){
  let r=s;for(let i=0;i<5;i++)r=r.replace(/([\u4e00-\u9fff])\s+([\u4e00-\u9fff])/g,'$1$2');
  for(let i=0;i<3;i++){r=r.replace(/([\dA-Za-z])\s+([\u4e00-\u9fff])/g,'$1$2');r=r.replace(/([\u4e00-\u9fff])\s+([\dA-Za-z])/g,'$1$2');}
  return r;
}

function findStation(lines){
  const ignore=['待取件','已放入','已签收','已到达','配送中','派件中','您的快件','请凭'];
  let fullText = lines.join(' ');
  fullText = cleanCJK(fullText);
  const presetMatch = matchPresetStation(fullText);
  if (presetMatch) return { station: presetMatch.name, presetAddress: presetMatch.address, presetLat: presetMatch.lat, presetLng: presetMatch.lng };

  for(const line of lines){
    let cl=cleanCJK(line);
    if(ignore.some(p=>cl.includes(p)))continue;
    for(const kw of['快递服务中心','代收点','服务中心','驿站','自提点','服务点','快递柜']){
      if(!cl.includes(kw))continue;
      let raw=cl.replace(/拨打电话.*$/g,'').replace(/[|｜]\s*拨打电话.*$/g,'').trim();
      raw=raw.replace(/^[，。\s|｜]+|[，。\s|｜]+$/g,'');
      if(raw.length>=4&&raw.length<=60)return { station: raw, presetAddress: '', presetLat: null, presetLng: null };
    }
  }
  return { station: '', presetAddress: '', presetLat: null, presetLng: null };
}

function findAddress(ct){
  let m=ct.match(/(?:收货地址|收货方|取件地址)[：:\s]*([\u4e00-\u9fff\d号栋座楼室区街道镇村路大道A-Za-z]{5,50})/);
  if(m)return m[1].replace(/[|｜].*$/g,'').trim();
  m=ct.match(/([\u4e00-\u9fff]{2,6}[市省][\u4e00-\u9fff]{2,6}[区县][\u4e00-\u9fff\d号路大道街道花园小区A-Za-z]{3,25})/);
  if(m)return m[1];
  m=ct.match(/([\u4e00-\u9fff]{2,6}[区县][\u4e00-\u9fff\d号路大道街道花园小区]{3,25})/);
  return m?m[1]:'';
}

function parseText(text){
  const lines=text.split(/\n/);
  const ct=cleanCJK(lines.join(' '));
  const cm={极兔:'极兔',极免:'极兔',圆通:'圆通',中通:'中通',韵达:'韵达',申通:'申通',顺丰:'顺丰',京东:'京东',邮政:'邮政EMS',EMS:'邮政EMS',菜鸟:'菜鸟',德邦:'德邦'};
  let courier='';for(const[k,v]of Object.entries(cm)){if(ct.includes(k)){courier=v;break;}}
  const stationResult=findStation(lines);
  const station=stationResult.station;
  const presetAddress=stationResult.presetAddress;
  const presetLat=stationResult.presetLat;
  const presetLng=stationResult.presetLng;
  const address=presetAddress||findAddress(ct);
  const results=[],seen=new Set();
  const labeled=ct.matchAll(/取件码[：:\s]*([A-Za-z0-9\-—]{2,15})/g);
  for(const m of labeled){const code=m[1].replace(/[—-]{2,}/g,'-').trim();if(code.length>=2&&!seen.has(code)){seen.add(code);results.push({code,courier,station,address,presetLat,presetLng});}}
  if(!results.length){const dc=/\b([A-Z]\d{1,3}\-\d{1,3}\-\d{2,4})\b/g;let m;while((m=dc.exec(ct))!==null){if(!seen.has(m[1])){seen.add(m[1]);results.push({code:m[1],courier,station,address,presetLat,presetLng});}}}
  if(!results.length){const pc=ct.matchAll(/取件[出出示]+手机号码[：:\s]*(\d[\d\*]{6,15})/g);for(const m of pc){const code='手机号码 '+m[1];if(!seen.has(code)){seen.add(code);results.push({code,courier,station,address,presetLat,presetLng});}}}
  return results.slice(0,10);
}

function resizeImage(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>1000){h*=1000/w;w=1000;}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);cv.toBlob(b=>resolve(b),'image/jpeg',.7);};img.src=e.target.result;};
    reader.readAsDataURL(file);
  });
}

async function processImage(imageFile){
  document.getElementById('ocrLoading').classList.add('show');
  document.getElementById('ocrResult').classList.remove('show');
  document.getElementById('ocrStatus').textContent='正在处理图片...';
  try{
    let processed=imageFile;try{processed=await resizeImage(imageFile);}catch(e){}
    if(!worker){
      document.getElementById('ocrStatus').textContent='首次需下载语言包，请稍候...';
      worker=await Tesseract.createWorker('chi_sim+eng',1,{langPath:'https://unpkg.com/tesseract.js-data@5',logger:m=>{if(m.status==='recognizing text')document.getElementById('ocrStatus').textContent='识别中... '+Math.round(m.progress*100)+'%';}});
    }
    document.getElementById('ocrStatus').textContent='正在识别...';
    const{data:{text}}=await worker.recognize(processed);
    showOcrResults(parseText(text),text);
  }catch(err){document.getElementById('ocrStatus').textContent='识别失败: '+err.message;}
}

function showOcrResults(codes,rawText){
  document.getElementById('ocrLoading').classList.remove('show');
  const c=document.getElementById('ocrResult'),el=document.getElementById('ocrItems');
  if(!codes.length){
    const did='d_'+Date.now();
    el.innerHTML='<div style="text-align:center;color:#BC8F8F;padding:10px">🧸 没有识别到取件码哦~</div>'+`<div style="padding:0 10px"><div onclick="var d=document.getElementById('${did}');d.style.display=d.style.display==='none'?'block':'none'" style="font-size:12px;color:#999;cursor:pointer">📝 查看原始文本</div><pre id="${did}" style="display:none;font-size:11px;color:#666;white-space:pre-wrap;word-break:break-all;background:#f5f5f5;padding:8px;border-radius:6px;margin-top:5px;max-height:200px;overflow-y:auto">${rawText.replace(/</g,'&lt;')}</pre></div>`;
    c.classList.add('show');return;
  }
  el.innerHTML=codes.map(ci=>{
    const info=[ci.courier,ci.station].filter(Boolean).join(' · ');
    return `<div class="ocr-item"><div><div class="code">${ci.code}</div><div class="info">${info}</div></div><button onclick="quickAdd('${ci.code.replace(/'/g,"\\'")}','${(ci.courier||'').replace(/'/g,"\\'")}','${(ci.station||'').replace(/'/g,"\\'")}','${(ci.address||'').replace(/'/g,"\\'")}',${ci.presetLat||'null'},${ci.presetLng||'null'})">添加</button></div>`;
  }).join('');
  c.classList.add('show');
}

function cleanupPickedUp(){
  const count=items.filter(i=>i.pickedUp).length;
  if(!count)return alert('没有已取快递');
  if(!confirm('确定删除 '+count+' 条已取快递？'))return;
  items=items.filter(i=>!i.pickedUp);
  localStorage.setItem('pickupItems',JSON.stringify(items));
  closeStats();renderCards();if(map)updateMarkers();
}

function toggleDarkMode(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  localStorage.setItem('darkMode',isDark);
  document.getElementById('darkBtn').textContent=isDark?'\u2600\uFE0F':'\uD83C\uDF19';
}

function openStats(){
  const total=items.length;
  const picked=items.filter(i=>i.pickedUp).length;
  const active=total-picked;
  const today=new Date().toDateString();
  const todayCount=items.filter(i=>new Date(i.id).toDateString()===today).length;
  const cs={};
  items.forEach(i=>{if(i.courier)cs[i.courier]=(cs[i.courier]||0)+1;});
  const top=Object.entries(cs).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('statsContent').innerHTML='<div class="stats-grid"><div class="stat-card"><div class="num">'+total+'</div><div class="label">总快递数</div></div><div class="stat-card"><div class="num">'+active+'</div><div class="label">待取快递</div></div><div class="stat-card"><div class="num">'+picked+'</div><div class="label">已取快递</div></div><div class="stat-card"><div class="num">'+todayCount+'</div><div class="label">今日新增</div></div></div>'+(top.length?'<div style="margin-top:15px;font-size:14px;color:#666;font-weight:600">快递公司排行</div>'+top.map(function(n){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0"><span>'+getLogo(n[0])+' '+n[0]+'</span><span style="font-weight:bold;color:#D81B60">'+n[1]+'件</span></div>';}).join(''):'')+'<div style="margin-top:15px;font-size:12px;color:#BC8F8F;text-align:center">有坐标的快递: '+items.filter(i=>i.lat&&i.lng).length+'件</div>';
  document.getElementById('statsModal').classList.add('show');
}
function closeStats(){document.getElementById('statsModal').classList.remove('show')}

renderCards();
if(localStorage.getItem('darkMode')==='true'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀️';}
</script>
</body>
</html>
